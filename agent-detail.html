<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Agent Detail — TRATON AI Marketplace</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="shared.css" />

  <style>
    /* ─── AGENT DETAIL LAYOUT ─── */
    .detail-body {
      padding: 48px 0 80px;
    }

    .detail-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 32px;
      margin-top: 32px;
    }

    .detail-col-left, .detail-col-right {
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    /* ─── METADATA PAIRS ─── */
    .meta-pair {
      display: flex;
      flex-direction: column;
      gap: 3px;
    }
    .meta-key {
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.7px;
      color: var(--text-muted);
    }
    .meta-val {
      font-size: 14px;
      color: var(--text-primary);
    }

    /* ─── SIDE-BY-SIDE ENTITY GROUPS ─── */
    .entities-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
    }

    /* ─── RUNS STATUS ─── */
    .run-ts {
      font-size: 12px;
      font-family: 'Courier New', monospace;
      color: var(--text-muted);
    }

    @media (max-width: 900px) {
      .detail-grid { grid-template-columns: 1fr; }
      .entities-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

  <!-- ─── HEADER ─── -->
  <header class="site-header">
    <div class="header-inner container">
      <a href="index.html" class="brand">
        <div class="brand-logo">T</div>
        <div>
          <span class="brand-name">TRATON Group</span>
          <span class="brand-subtitle">AI Agent Marketplace</span>
        </div>
      </a>
      <nav class="site-nav">
        <a href="index.html"      class="nav-link active">Agents</a>
        <a href="skills.html"     class="nav-link">Skills</a>
        <a href="index.html#governance" class="nav-link">Governance</a>
        <a href="index.html#about"      class="nav-link">About</a>
        <a href="innovation.html" class="nav-link nav-link--highlight">Project Overview</a>
      </nav>
    </div>
  </header>

  <!-- ─── HERO ─── -->
  <div class="detail-hero" id="detail-hero">
    <div class="container">
      <a href="index.html" class="detail-back">← All Agents</a>
      <div class="detail-hero-inner" id="detail-hero-inner">
        <p style="color:rgba(255,255,255,.5)">Loading…</p>
      </div>
    </div>
  </div>

  <!-- ─── BODY ─── -->
  <div class="detail-body">
    <div class="container" id="detail-container">
      <div class="state-message"><p>Loading agent…</p></div>
    </div>
  </div>

  <!-- ─── FOOTER ─── -->
  <footer class="site-footer">
    <div class="container">
      <p>
        <span>TRATON Group AI Agent Marketplace</span> &nbsp;·&nbsp;
        Internal prototype &nbsp;·&nbsp;
        Scania · MAN · Volkswagen Truck &amp; Bus
      </p>
    </div>
  </footer>

  <script>
    const API = '/api';

    function getParam(name) {
      return new URLSearchParams(location.search).get(name);
    }

    function brandKey(brand) {
      const b = (brand || '').toLowerCase();
      if (b.includes('scania')) return 'scania';
      if (b.includes('man'))    return 'man';
      if (b.includes('vw') || b.includes('volkswagen')) return 'vwtb';
      return 'traton';
    }

    function statusKey(status) {
      return (status || 'idle').toLowerCase();
    }

    function fmtDate(iso) {
      if (!iso) return '—';
      return new Date(iso).toLocaleDateString('en-GB', { day: 'numeric', month: 'short', year: 'numeric' });
    }

    function policyTagHtml(tag, descMap) {
      const slug = tag.replace(/\s+/g, '-').toLowerCase();
      const knownSlugs = ['contains-pii', 'external-facing', 'financial-data', 'internal-only'];
      const cls = knownSlugs.includes(slug) ? `policy-tag--${slug}` : 'policy-tag--default';
      const desc = descMap[tag] || tag;
      return `<a href="policy-tags.html" class="policy-tag ${cls}" data-tooltip="${desc}">${tag}</a>`;
    }

    function runStatusHtml(status) {
      const s = (status || '').toLowerCase();
      const cls = s === 'success' ? 'run-status--success' : s === 'failed' ? 'run-status--failed' : 'run-status--running';
      return `<span class="run-status ${cls}">${status}</span>`;
    }

    async function load() {
      const id = getParam('id');
      if (!id) {
        showError('No agent ID specified in URL.');
        return;
      }

      let agent, runs = [], policyDescriptions = {};

      try {
        const res = await fetch(`${API}/agents/${id}`);
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        agent = await res.json();
        document.title = `${agent.name} — TRATON AI Marketplace`;
      } catch (e) {
        showError('⚠️ Backend not running', 'Start the API server with: <code>npm start</code> (port 3001)');
        return;
      }

      // Fetch policy tag descriptions (non-fatal)
      try {
        const pr = await fetch(`${API}/policy-tags`);
        if (pr.ok) {
          const tags = await pr.json();
          tags.forEach(t => { policyDescriptions[t.name] = t.description; });
        }
      } catch (_) {}

      // Fetch recent runs (non-fatal)
      try {
        const rr = await fetch(`${API}/agent-runs?agent_id=${id}&limit=5`);
        if (rr.ok) runs = await rr.json();
      } catch (_) {}

      renderHero(agent);
      renderBody(agent, runs, policyDescriptions);
    }

    function showError(title, body = '') {
      document.getElementById('detail-hero-inner').innerHTML = `<p style="color:rgba(255,255,255,.5)">${title}</p>`;
      document.getElementById('detail-container').innerHTML = `
        <div class="state-message state-message--error">
          <h3>${title}</h3>
          ${body ? `<p>${body}</p>` : ''}
        </div>`;
    }

    function renderHero(agent) {
      const bk = brandKey(agent.brand);
      const sk = statusKey(agent.status);
      document.getElementById('detail-hero-inner').innerHTML = `
        <div class="detail-icon">${agent.icon || '🤖'}</div>
        <div class="detail-hero-meta">
          <div class="detail-hero-name">${agent.name}</div>
          <div class="detail-hero-badges">
            <span class="brand-badge brand-badge--${bk}">${agent.brand}</span>
            <span class="status-badge status-badge--${sk}">${agent.status}</span>
            ${agent.domain ? `<span class="domain-tag" style="background:rgba(255,255,255,.1);color:rgba(255,255,255,.7)">${agent.domain}</span>` : ''}
          </div>
        </div>`;
    }

    function renderBody(agent, runs, policyDescriptions) {
      const skillsUsed = agent.skills_used || [];
      const toolsUsed  = agent.tools_used  || [];

      // Build skills & tools section — side by side if both present, full-width if only one
      let entitiesHtml = '';
      const hasBoth = skillsUsed.length > 0 && toolsUsed.length > 0;

      function skillCard(s) {
        const approvalCls = `approval-badge--${(s.approval_state || 'draft').toLowerCase()}`;
        const tagPills = (s.policy_tags || []).map(t => policyTagHtml(t, policyDescriptions)).join('');
        return `
          <div class="content-card" style="margin-bottom:0">
            <div class="content-card-title" style="display:flex;align-items:center;justify-content:space-between;gap:8px">
              <a href="skill-detail.html?id=${s.id}" style="color:var(--traton-blue);font-weight:700">${s.name}</a>
              <span class="approval-badge ${approvalCls}">${s.approval_state || 'draft'}</span>
            </div>
            ${s.category ? `<span class="category-tag" style="display:inline-block;margin-bottom:10px">${s.category}</span>` : ''}
            ${s.description ? `<p style="font-size:13px;color:var(--text-secondary);margin-bottom:${tagPills ? '10px' : '0'}">${s.description}</p>` : ''}
            ${tagPills ? `<div class="policy-tags-row">${tagPills}</div>` : ''}
          </div>`;
      }

      function toolCard(t) {
        const tagPills = (t.policy_tags || []).map(tag => policyTagHtml(tag, policyDescriptions)).join('');
        return `
          <div class="content-card" style="margin-bottom:0">
            <div class="content-card-title" style="display:flex;align-items:center;justify-content:space-between;gap:8px">
              <span style="font-weight:700">${t.name}</span>
              ${t.type ? `<span class="category-tag">${t.type}</span>` : ''}
            </div>
            ${t.description ? `<p style="font-size:13px;color:var(--text-secondary);margin-bottom:${tagPills ? '10px' : '0'}">${t.description}</p>` : ''}
            ${tagPills ? `<div class="policy-tags-row">${tagPills}</div>` : ''}
          </div>`;
      }

      if (hasBoth) {
        entitiesHtml = `
          <div class="entities-grid">
            <div>
              <div class="subsection-label" style="margin-bottom:12px">Skills used (${skillsUsed.length})</div>
              <div style="display:flex;flex-direction:column;gap:12px">
                ${skillsUsed.map(skillCard).join('')}
              </div>
            </div>
            <div>
              <div class="subsection-label" style="margin-bottom:12px">Tools used (${toolsUsed.length})</div>
              <div style="display:flex;flex-direction:column;gap:12px">
                ${toolsUsed.map(toolCard).join('')}
              </div>
            </div>
          </div>`;
      } else if (skillsUsed.length > 0) {
        entitiesHtml = `
          <div class="content-card">
            <div class="content-card-title">Skills used (${skillsUsed.length})</div>
            <div style="display:flex;flex-direction:column;gap:12px">
              ${skillsUsed.map(skillCard).join('')}
            </div>
          </div>`;
      } else if (toolsUsed.length > 0) {
        entitiesHtml = `
          <div class="content-card">
            <div class="content-card-title">Tools used (${toolsUsed.length})</div>
            <div style="display:flex;flex-direction:column;gap:12px">
              ${toolsUsed.map(toolCard).join('')}
            </div>
          </div>`;
      }

      // Runs table
      let runsHtml = '';
      if (runs.length > 0) {
        runsHtml = `
          <table class="mini-table">
            <thead><tr>
              <th>When</th><th>Triggered by</th><th>Skills invoked</th><th>Status</th>
            </tr></thead>
            <tbody>
              ${runs.slice(0, 5).map(r => `
                <tr>
                  <td class="run-ts">${fmtDate(r.ran_at || r.created_at)}</td>
                  <td>${r.triggered_by || '—'}</td>
                  <td>${(r.skills_invoked || []).join(', ') || '—'}</td>
                  <td>${runStatusHtml(r.status)}</td>
                </tr>`).join('')}
            </tbody>
          </table>`;
      } else {
        runsHtml = '<p style="font-size:13px;color:var(--text-muted)">No recent runs recorded.</p>';
      }

      // Capabilities list
      const caps = agent.capabilities || [];
      const capsHtml = caps.length > 0
        ? `<ul class="capabilities-list">${caps.map(c => `<li>${c}</li>`).join('')}</ul>`
        : '';

      document.getElementById('detail-container').innerHTML = `
        <div class="detail-grid">
          <div class="detail-col-left">
            <div class="content-card">
              <div class="content-card-title">About this agent</div>
              <p style="font-size:14px;color:var(--text-secondary);line-height:1.7;margin-bottom:${caps.length ? '20px' : '0'}">${agent.description || '—'}</p>
              ${capsHtml}
            </div>

            ${entitiesHtml}
          </div>

          <div class="detail-col-right">
            <div class="content-card">
              <div class="content-card-title">Metadata</div>
              <div style="display:flex;flex-direction:column;gap:16px">
                ${agent.owner_name ? `
                  <div class="meta-pair">
                    <span class="meta-key">Owner</span>
                    <span class="meta-val">${agent.owner_name}${agent.owner_team ? ` · ${agent.owner_team}` : ''}</span>
                    ${agent.owner_email ? `<span style="font-size:12px;color:var(--text-muted)">${agent.owner_email}</span>` : ''}
                  </div>` : ''}
                ${agent.version ? `
                  <div class="meta-pair">
                    <span class="meta-key">Version</span>
                    <span class="meta-val">v${agent.version}</span>
                  </div>` : ''}
                ${agent.last_reviewed_at ? `
                  <div class="meta-pair">
                    <span class="meta-key">Last Reviewed</span>
                    <span class="meta-val">${fmtDate(agent.last_reviewed_at)}</span>
                  </div>` : ''}
                ${agent.policy_tags && agent.policy_tags.length > 0 ? `
                  <div class="meta-pair">
                    <span class="meta-key">Policy Tags</span>
                    <div class="policy-tags-row" style="margin-top:6px">
                      ${agent.policy_tags.map(t => policyTagHtml(t, policyDescriptions)).join('')}
                    </div>
                  </div>` : ''}
              </div>
            </div>

            <div class="content-card">
              <div class="content-card-title">Recent runs</div>
              ${runsHtml}
            </div>
          </div>
        </div>`;
    }

    document.addEventListener('DOMContentLoaded', load);
  </script>
</body>
</html>
